<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="view-transition" content="same-origin" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: { 850: '#1e293b', 900: '#0f172a', 950: '#020617' },
                        primary: { 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' },
                        success: '#22c55e',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                    },
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    },
                    animation: {
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'in': 'fadeIn 0.2s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(-10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000; color: #e2e8f0; }
        /* Hide scrollbars for fullscreen feel */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden bg-black">

    <div class="fixed inset-0 bg-black z-[100] flex flex-col group/container">
      
      <!-- Floating Toolbar (Top) - Shows on Hover -->
      <div class="absolute top-0 left-0 right-0 h-16 bg-gradient-to-b from-black/80 to-transparent flex items-start justify-between px-6 py-4 z-50 transition-transform duration-300 transform -translate-y-full group-hover/container:translate-y-0">
        <div class="flex items-center gap-3">
          <div class="w-2.5 h-2.5 rounded-full shadow-[0_0_8px_rgba(0,0,0,0.5)] bg-success animate-pulse"></div>
          <div class="flex flex-col">
            <span class="text-white font-semibold text-sm leading-tight drop-shadow-md">
              LAB-WIN-04
            </span>
            <span class="text-[10px] text-slate-300 font-mono opacity-80 drop-shadow-md">
                1920x1080 • 30FPS • Software
            </span>
          </div>
        </div>

        <div class="flex items-center gap-2">
          <button class="p-2 rounded-full bg-black/40 hover:bg-white/20 text-white backdrop-blur-sm transition-all" title="Toggle Fullscreen">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path>
            </svg>
          </button>
          
          <button onclick="document.getElementById('settings-modal').classList.toggle('hidden')" class="p-2 rounded-full bg-black/40 hover:bg-white/20 text-white backdrop-blur-sm transition-all" title="Stream Settings">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
          </button>
          
          <button onclick="window.location.href='vnc.html'" class="bg-red-600/90 hover:bg-red-600 text-white px-4 py-1.5 rounded-full text-sm font-medium backdrop-blur-sm shadow-lg transition-all ml-2">
            Disconnect
          </button>
        </div>
      </div>

      <!-- Settings Modal - Floating (Hidden by default) -->
      <div id="settings-modal" class="hidden absolute top-20 right-6 z-50 w-80 bg-slate-900/95 backdrop-blur-md border border-slate-700/50 shadow-2xl rounded-xl p-5 text-sm text-slate-300 animate-in fade-in slide-in-from-top-4 duration-200">
          <div class="flex items-center justify-between mb-4 pb-2 border-b border-white/10">
            <h3 class="font-semibold text-white">Stream Settings</h3>
            <button onclick="document.getElementById('settings-modal').classList.add('hidden')" class="text-slate-400 hover:text-white">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
          </div>

          <div class="space-y-4">
            <div class="flex items-center justify-between bg-white/5 p-2 rounded-lg">
              <label class="text-slate-200">Auto-Resize</label>
              <div class="relative inline-block w-10 h-5 transition duration-200 ease-in-out cursor-pointer">
                <input type="checkbox" checked class="peer absolute opacity-0 w-0 h-0" />
                <div class="block w-10 h-5 rounded-full bg-primary-600 transition-colors duration-200"></div>
                <div class="absolute left-1 top-1 bg-white w-3 h-3 rounded-full transition-transform duration-200 translate-x-5"></div>
              </div>
            </div>

            <div class="space-y-1">
              <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Resolution</label>
              <div class="grid grid-cols-2 gap-2">
                <div class="relative">
                  <input type="number" disabled value="1920" class="bg-black/40 border border-slate-700 rounded-lg px-3 py-2 w-full text-white disabled:opacity-50 focus:outline-none focus:border-primary-500 transition-colors">
                  <span class="absolute right-2 top-2 text-xs text-slate-500 pointer-events-none">px</span>
                </div>
                <div class="relative">
                  <input type="number" disabled value="1080" class="bg-black/40 border border-slate-700 rounded-lg px-3 py-2 w-full text-white disabled:opacity-50 focus:outline-none focus:border-primary-500 transition-colors">
                  <span class="absolute right-2 top-2 text-xs text-slate-500 pointer-events-none">px</span>
                </div>
              </div>
            </div>

            <div class="space-y-1">
              <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Target FPS</label>
              <select class="bg-black/40 border border-slate-700 rounded-lg px-3 py-2 w-full text-white focus:outline-none focus:border-primary-500 transition-colors appearance-none">
                <option value="30">30 FPS</option>
                <option value="60">60 FPS</option>
              </select>
            </div>

            <div class="space-y-1">
              <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Bitrate</label>
              <select class="bg-black/40 border border-slate-700 rounded-lg px-3 py-2 w-full text-white focus:outline-none focus:border-primary-500 transition-colors appearance-none">
                <option value="2000">2 Mbps</option>
                <option value="4000" selected>4 Mbps</option>
                <option value="8000">8 Mbps</option>
              </select>
            </div>
            
            <button class="w-full bg-primary-600 hover:bg-primary-500 text-white py-2 rounded-lg font-medium transition-colors shadow-lg shadow-primary-500/20">
                Apply Changes
            </button>
          </div>
      </div>

      <!-- Main Remote View Area -->
      <main class="flex-1 relative bg-black flex items-center justify-center overflow-hidden cursor-crosshair">
        
        <!-- Remote Screen Container -->
        <div class="relative w-full h-full flex items-center justify-center">
            
            <!-- Simulated Desktop Content -->
            <div class="relative w-full h-full max-w-[1920px] max-h-[1080px] aspect-video bg-gradient-to-br from-blue-900 to-slate-900 flex items-center justify-center shadow-2xl">
                <svg class="w-64 h-64 text-blue-500/10" viewBox="0 0 24 24" fill="currentColor"><path d="M0 3.449L9.75 2.1v9.451H0m10.949-9.602L24 0v11.4h-13.051M0 12.6h9.75v9.451L0 20.699M10.949 12.6H24V24l-12.9-1.801"/></svg>
                
                <!-- Desktop Icons -->
                <div class="absolute top-8 left-8 space-y-6">
                    <div class="flex flex-col items-center w-16 group cursor-pointer">
                        <div class="w-12 h-12 bg-blue-500/90 rounded-sm flex items-center justify-center text-white mb-1 shadow-sm border border-white/10 hover:bg-blue-400/90 transition-colors">
                            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        </div>
                        <span class="text-white text-[11px] text-center drop-shadow-md px-1 rounded line-clamp-2 leading-tight">This PC</span>
                    </div>
                    <div class="flex flex-col items-center w-16 group cursor-pointer">
                        <div class="w-12 h-12 bg-yellow-500/90 rounded-sm flex items-center justify-center text-white mb-1 shadow-sm border border-white/10 hover:bg-yellow-400/90 transition-colors">
                            <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
                        </div>
                        <span class="text-white text-[11px] text-center drop-shadow-md px-1 rounded line-clamp-2 leading-tight">File Explorer</span>
                    </div>
                </div>

                <!-- Taskbar -->
                <div class="absolute bottom-0 w-full h-12 bg-slate-900/95 backdrop-blur border-t border-white/10 flex items-center justify-center gap-1.5">
                    <div class="w-10 h-10 rounded hover:bg-white/10 flex items-center justify-center transition-colors">
                        <svg class="w-6 h-6 text-blue-400" viewBox="0 0 24 24" fill="currentColor"><path d="M0 3.449L9.75 2.1v9.451H0m10.949-9.602L24 0v11.4h-13.051M0 12.6h9.75v9.451L0 20.699M10.949 12.6H24V24l-12.9-1.801"/></svg>
                    </div>
                    <div class="w-10 h-10 rounded hover:bg-white/10 flex items-center justify-center transition-colors">
                        <div class="w-6 h-6 bg-gray-400 rounded-sm"></div>
                    </div>
                    <div class="w-10 h-10 rounded hover:bg-white/10 flex items-center justify-center transition-colors">
                        <div class="w-6 h-6 bg-yellow-400 rounded-sm"></div>
                    </div>
                    <div class="w-10 h-10 rounded hover:bg-white/10 flex items-center justify-center transition-colors bg-white/5 border-b-2 border-blue-400">
                        <div class="w-6 h-6 bg-blue-600 rounded-full"></div>
                    </div>
                </div>
            </div>

            <!-- Cursor -->
            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 pointer-events-none">
                <svg class="w-8 h-8 text-white drop-shadow-xl filter drop-shadow-lg" fill="currentColor" viewBox="0 0 24 24" style="filter: drop-shadow(1px 1px 3px rgba(0,0,0,0.6));">
                    <path d="M5.5 3.21V20.8c0 .45.54.67.85.35l4.86-4.86a.5.5 0 0 1 .35-.15h6.87a.5.5 0 0 0 .35-.85L6.35 2.85a.5.5 0 0 0-.85.35z"/>
                </svg>
            </div>
        </div>

      </main>

    </div>

</body>
</html>
